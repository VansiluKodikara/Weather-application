<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherFinder</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cossette+Texte&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Header -->
    <header class="top-bar">
        <div class="header-content">
            <!-- Logo + Title -->
            <div class="logo">
                <img src="assets/img/icon.png" alt="Weather Icon" class="weather-icon">
                <h1 style="font-family: 'Cossette Texte', cursive;">Weather Finder</h1>
            </div>

            <!-- Search Box -->
            <div class="searchBox">
                <form action="#" id="searchForm">
                    <input 
                        type="text" 
                        class="searchInput" 
                        id="searchInput"
                        placeholder="Search city..." 
                        autocomplete="off">
                    
                    <button type="submit" class="searchButton">
                        <span class="material-symbols-outlined">search</span>
                    </button>
                </form>
            </div>
        </div>
    </header>

    <main>
        <!-- Light & Dark Mode Buttons -->
        <button type="button" class="lightModeButton">
            <span class="material-symbols-outlined">light_mode</span>
        </button>

        <button type="button" class="darkModeButton">
            <span class="material-symbols-outlined">dark_mode</span>
        </button>

        <!-- Your weather content will go here later -->
    </main>

    <footer style="background-color: rgb(44, 44, 44); position: fixed; bottom: 0; width: 100%;">
        <div class="text-center p-3" style="color: white; font-family: 'Cossette Texte', cursive;">
            © 2025 WeatherFinder. All rights reserved.
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- Your custom JS (if you have one) -->
    <!-- <script src="assets/js/weather-app.js"></script> -->
</body>
</html>
