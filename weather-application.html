<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <!-- Header -->
<header class="top-bar" style="background-color: rgb(44, 44, 44);">
    <div class="header-content">
        <!-- Logo + Title -->
        <div class="logo">
            <img src="assets/img/icon.png" alt="Weather Icon" class="weather-icon">
            <h1 style="font-family: 'Cossette Texte', cursive;">Weather Finder</h1>
        </div>

        <!-- Search Box -->
        <div class="searchBox">
            <form action="#" id="searchForm">
                <input 
                    type="text" 
                    class="searchInput" 
                    id="searchInput"
                    placeholder="Search city..." 
                    autocomplete="off">
                
                <button type="submit" class="searchButton">
                    <span class="material-symbols-outlined">search</span>
                </button>
            </form>
        </div>
    </div>
</header>

    <main style="height: 200vh; ">

        <button type="light-mode" class="lightModeButton">
            <span class="material-symbols-outlined">light_mode</span>
        </button>

        <button type="dark-mode" class="darkModeButton">
            <span class="material-symbols-outlined">dark_mode</span>
        </button>

    </main>

    <footer class="" style="background-color: rgb(44, 44, 44); bottom: 0; width: 100%; position: fixed;">
        <div class="text-center p-3" style="color: white; font-family: 'Cossette Texte', cursive;">
            © 2025 WeatherFinder. All rights reserved.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
